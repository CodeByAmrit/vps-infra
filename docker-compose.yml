services:
  traefik:
    image: traefik:v3.6.10
    container_name: traefik
    restart: unless-stopped

    command:
      # -----------------------
      # Docker Provider
      # -----------------------
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"

      # -----------------------
      # EntryPoints
      # -----------------------
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http3=true"
      - "--entrypoints.metrics.address=:8082"

      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # Cloudflare / Proxy headers
      - "--entrypoints.websecure.forwardedHeaders.insecure=true"

      # -----------------------
      # TLS / Let's Encrypt
      # -----------------------
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=me.sharma.amrit@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

      # -----------------------
      # API & Dashboard
      # -----------------------
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # -----------------------
      # Logs
      # -----------------------
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--accesslog.fields.defaultmode=keep"

      # -----------------------
      # Metrics (Prometheus)
      # -----------------------
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addrouterslabels=true"
      - "--metrics.prometheus.addserviceslabels=true"
      - "--metrics.prometheus.entrypoint=metrics"

      # -----------------------
      # Health Check
      # -----------------------
      - "--ping=true"
      - "--ping.entrypoint=web"

      # -----------------------
      # Performance Tuning
      # -----------------------
      - "--serversTransport.maxIdleConnsPerHost=200"
      - "--serversTransport.insecureSkipVerify=false"

      # Timeouts (important for streaming / long connections)
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=180s"

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "8082:8082" # metrics

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

    security_opt:
      - no-new-privileges:true

    ulimits:
      nofile:
        soft: 200000
        hard: 200000

    networks:
      - proxy

    labels:
      - "traefik.enable=true"

      # -----------------------
      # Dashboard Router
      # -----------------------
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.amritsharma.dev`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth"

      # Basic Auth
      - "traefik.http.middlewares.auth.basicauth.users=admin:$2b$10$3VOxAUjOOO.9K2kRuOsYD.0CjqnMI/HBzwrSi440FgjKc6G2nGIPu"

networks:
  proxy:
    external: true