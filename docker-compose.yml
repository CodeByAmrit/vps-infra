services:
  traefik:
    image: traefik:v3.6.10
    container_name: traefik
    restart: unless-stopped

    command:
      # Docker
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"

      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Redirect HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # Cloudflare Resolver 1 (amritsharma.dev)
      - "--certificatesresolvers.cf-main.acme.dnschallenge=true"
      - "--certificatesresolvers.cf-main.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cf-main.acme.email=me.sharma.amrit@gmail.com"
      - "--certificatesresolvers.cf-main.acme.storage=/letsencrypt/cf-main.json"

      # Cloudflare Resolver 2 (cctvcameralive.in)
      - "--certificatesresolvers.cf-stream.acme.dnschallenge=true"
      - "--certificatesresolvers.cf-stream.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cf-stream.acme.email=netwonteam@gmail.com"
      - "--certificatesresolvers.cf-stream.acme.storage=/letsencrypt/cf-stream.json"

      # Logs
      - "--log.level=INFO"
      - "--accesslog=true"

      # Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

    secrets:
      - cf_main_token
      - cf_stream_token

    environment:
      # Resolver 1
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_main_token

      # ⚠️ Trick: second resolver uses same env var name internally,
      # so we duplicate container using file swap (explained below)

    security_opt:
      - no-new-privileges:true

    networks:
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.amritsharma.dev`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=cf-main"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$2y$$05$$vR2i9C8q1D56j7c1/sMv4evT/B3Y4176O8Z5rGv2M/D9aKzFwXQY6"

secrets:
  cf_main_token:
    file: ./secrets/cf_main_token
  cf_stream_token:
    file: ./secrets/cf_stream_token

networks:
  proxy:
    external: true